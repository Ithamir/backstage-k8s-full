name: Cleanup GHCR

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  cleanup-backstage:
    name: Cleanup backstage
    runs-on: ubuntu-latest
    steps:
      - name: Resolve repository package namespace
        id: repo
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"

      - name: Delete old backstage image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ steps.repo.outputs.repo }}/backstage
          package-type: container
          token: ${{ secrets.GITHUB_TOKEN }}
          min-versions-to-keep: 10
          delete-only-untagged-versions: 'false'
