name: Cleanup GHCR

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  cleanup-backstage:
    name: Cleanup backstage
    runs-on: ubuntu-latest
    steps:
      - name: Delete old backstage image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: backstage-k8s-full/backstage
          package-type: container
          token: ${{ secrets.GITHUB_TOKEN }}
          min-versions-to-keep: 10
          delete-only-untagged-versions: 'false'
