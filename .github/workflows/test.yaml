name: Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Register Helm repositories
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -fsSL -o actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          mkdir -p "$HOME/.local/bin"
          mv actionlint "$HOME/.local/bin/actionlint"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install yq
        env:
          YQ_VERSION: v4.44.3
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
      - name: charts-lint
        run: |
          ./tests/charts/test-actionlint.sh
          ./tests/charts/test-github-workflow-repo-slug.sh
          ./tests/charts/test-scaffolder-template-syntax.sh
          ./tests/charts/test-scaffolder-form-defaults.sh
          ./tests/charts/test-hello-world-source.sh
          ./tests/charts/test-templates-registered.sh
          ./tests/charts/test-chart-layout.sh
          ./tests/charts/test-no-make-references.sh
          ./tests/ci/test-no-literal-repo-slug.sh
          ./tests/ci/test-no-literal-admin-name.sh
          ./tests/docs/test-github-app-setup-doc.sh
          ./tests/docs/test-readme-gitops-bootstrap-doc.sh
          helm dependency build charts/platform/argo-cd
          helm lint charts/platform/argo-cd
          helm dependency build charts/platform/envoy-gateway
          helm lint charts/platform/envoy-gateway
          helm lint charts/platform/edge-gateway -f deploy/dev/edge-gateway.yaml
          helm lint charts/workloads/backstage -f deploy/dev/backstage.yaml
      - name: charts-test
        run: |
          ./tests/charts/test-backstage-image.sh
          ./tests/charts/test-backstage-secrets.sh
          ./tests/charts/test-backstage-oauth.sh
          ./tests/charts/test-backstage-configmap.sh
          ./tests/charts/test-backstage-catalog-config.sh
          ./tests/charts/test-backstage-mkdocs-image-toolchain.sh
          ./tests/charts/test-backstage-techdocs-config.sh
          ./tests/charts/test-backstage-kubernetes-label.sh
          ./tests/charts/test-backstage-httproute-defaults.sh
          ./tests/charts/test-backstage-rbac.sh
          ./tests/charts/test-backstage-rbac-admin-user.sh
          ./tests/charts/test-backstage-admin-config-layer.sh
          ./tests/charts/test-edge-gateway-kubernetes-label.sh
          ./tests/charts/test-application-techdocs-scaffold.sh
          ./tests/charts/test-application-kubernetes-scaffold.sh
          ./tests/charts/test-application-image-renders.sh
          ./tests/charts/test-ci-pipeline-scaffold.sh
          ./tests/charts/test-ci-pipeline-catalog-scaffold.sh
          ./tests/charts/test-platform-argo-cd-renders.sh
          ./tests/charts/test-platform-envoy-gateway-renders.sh
          ./tests/charts/test-workloads-appset-ignore-missing-value-files.sh
          ./tests/gitops/test-platform-appset.sh
          ./tests/gitops/test-workloads-appset.sh
      - name: rbac-test
        run: ./tests/rbac/test-rbac-policies-csv.sh
      - name: rbac-admin-auth-test
        run: ./tests/rbac/test-github-admin-auth-config.sh
      - name: tf-check
        run: |
          ./tests/terraform/test-git-remote.sh
          ./tests/terraform/test-bootstrap-seed.sh
          terraform -chdir=terraform fmt -check -recursive
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform validate

  docs-lint:
    name: docs-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run TechDocs lint
        run: npx -y @techdocs/cli@latest generate --source-dir . --output-dir ./.techdocs-output --verbose
