name: Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -fsSL -o actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          mkdir -p "$HOME/.local/bin"
          mv actionlint "$HOME/.local/bin/actionlint"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install yq
        env:
          YQ_VERSION: v4.44.3
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
      - name: charts-lint
        run: make charts-lint
      - name: charts-test
        run: make charts-test
      - name: rbac-test
        run: make rbac-test
      - name: rbac-admin-auth-test
        run: make rbac-admin-auth-test
      - name: tf-check
        run: make tf-check

  docs-lint:
    name: docs-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run TechDocs lint
        run: npx -y @techdocs/cli@latest generate --source-dir . --output-dir ./.techdocs-output --verbose
