name: Build Image

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      bump-file:
        required: true
        type: string
      bump-yaml-path:
        required: false
        type: string
        default: .image.tag

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  issues: write

concurrency:
  group: build-${{ inputs.app-name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ inputs.app-name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set image metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          image="ghcr.io/itamar-ratson/backstage-k8s-full/${{ inputs.app-name }}"
          echo "short-sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${image}:${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          provenance: mode=max
          sbom: true
          push: true
          tags: ${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=${{ inputs.app-name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app-name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image digest
        run: cosign sign --yes "${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Prepare main for bump
        run: |
          git fetch origin main
          git switch --force-create main origin/main

      - name: Install yq
        env:
          YQ_VERSION: v4.44.3
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Bump deploy image tag
        env:
          BUMP_FILE: ${{ inputs.bump-file }}
          BUMP_YAML_PATH: ${{ inputs.bump-yaml-path }}
          IMAGE_TAG: ${{ steps.meta.outputs.short-sha }}
        run: yq -i "${BUMP_YAML_PATH} = strenv(IMAGE_TAG)" "$BUMP_FILE"

      - name: Commit and push bump
        env:
          BUMP_FILE: ${{ inputs.bump-file }}
          IMAGE_TAG: ${{ steps.meta.outputs.short-sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$BUMP_FILE"
          git diff --cached --quiet && exit 0
          git commit -m "Bump ${{ inputs.app-name }} image to ${IMAGE_TAG}"
          git push origin main

  failure-notification:
    name: Notify build failure
    runs-on: ubuntu-latest
    needs: build
    if: ${{ failure() }}
    steps:
      - name: Open GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_NAME: ${{ inputs.app-name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          body=$(printf 'App: %s\nSHA: %s\nRun: %s\n' "${APP_NAME}" "${SHA}" "${RUN_URL}")
          gh issue create \
            --title "Image build failed for ${APP_NAME} at ${SHA::7}" \
            --body "$body"
