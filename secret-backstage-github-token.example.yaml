# Template for the backstage-github-token Secret.
#
# Backstage uses this Secret to authenticate against GitHub when discovering
# catalog entities at runtime. The fine-grained PAT must have at least:
#   - Repository access: Itamar-Ratson/backstage-k8s-full
#   - Contents: Read
#   - Commit statuses: Read  (preflight check; without this the catalog
#                             URL provider 403s before reading the file)
#   - Metadata: Read         (auto-granted)
#
# To apply:
#   1. Copy this file to `secret-backstage-github-token.yaml`
#      (the real filename is gitignored — see .gitignore)
#   2. Replace REPLACE_WITH_FINE_GRAINED_PAT below
#   3. kubectl apply -f secret-backstage-github-token.yaml --context kind-backstage
#
# Or skip the file entirely and use the imperative form documented in
# README.md step 5:
#   kubectl create secret generic backstage-github-token \
#     --from-literal=GITHUB_TOKEN="$GITHUB_TOKEN" \
#     -n backstage --context kind-backstage
apiVersion: v1
kind: Secret
metadata:
  name: backstage-github-token
  namespace: backstage
stringData:
  GITHUB_TOKEN: REPLACE_WITH_FINE_GRAINED_PAT
