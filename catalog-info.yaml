---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: platform
  description: Platform infrastructure for the developer portal and supporting services.
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: platform
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: developer-portal
  description: Backstage-based developer portal providing a software catalog, scaffolder, and documentation hub.
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: platform
  domain: platform
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: edge
  description: Edge networking layer providing ingress and routing via Envoy Gateway.
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: platform
  domain: platform
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform
  description: Platform engineering team responsible for infrastructure and developer tooling.
spec:
  type: team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: itamar
spec:
  memberOf:
    - platform
---
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: application-template
  description: Backstage scaffolder template for applications.
spec:
  type: url
  target: ./templates/application/template.yaml
---
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: decommission-component-template
  description: Backstage scaffolder template for removing scaffolded components.
spec:
  type: url
  target: ./templates/decommission-component/template.yaml
---
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: ci-pipeline-template
  description: Backstage scaffolder template for CI pipeline workflows.
spec:
  type: url
  target: ./templates/ci-pipeline/template.yaml
