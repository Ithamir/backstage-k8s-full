# Template for the backstage-github-oauth Secret.
#
# Backstage uses this Secret to expose AUTH_GITHUB_CLIENT_ID and
# AUTH_GITHUB_CLIENT_SECRET to the pod via envFrom, which the runtime
# app-config resolves into the GitHub auth provider.
#
# Provision a GitHub OAuth App at <https://github.com/settings/developers>
# with:
#   - Homepage URL:          http://backstage.localtest.me:8080
#   - Authorization callback: http://backstage.localtest.me:8080/api/auth/github/handler/frame
#
# To apply:
#   1. Copy this file to `secret-backstage-github-oauth.yaml`
#      (the real filename is gitignored — see .gitignore)
#   2. Replace REPLACE_WITH_OAUTH_CLIENT_ID and REPLACE_WITH_OAUTH_CLIENT_SECRET below
#   3. kubectl apply -f secret-backstage-github-oauth.yaml --context kind-backstage
#
# Or skip the file entirely and use the imperative form documented in
# README.md step 6:
#   kubectl create secret generic backstage-github-oauth \
#     --from-literal=AUTH_GITHUB_CLIENT_ID="$AUTH_GITHUB_CLIENT_ID" \
#     --from-literal=AUTH_GITHUB_CLIENT_SECRET="$AUTH_GITHUB_CLIENT_SECRET" \
#     -n backstage --context kind-backstage
apiVersion: v1
kind: Secret
metadata:
  name: backstage-github-oauth
  namespace: backstage
stringData:
  AUTH_GITHUB_CLIENT_ID: REPLACE_WITH_OAUTH_CLIENT_ID
  AUTH_GITHUB_CLIENT_SECRET: REPLACE_WITH_OAUTH_CLIENT_SECRET
