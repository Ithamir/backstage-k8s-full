apiVersion: v1
kind: ConfigMap
{{- $rbacAdminUser := .Values.rbac.adminUser }}
{{- $rbacAdminEntityRef := printf "user:default/%s" $rbacAdminUser }}
metadata:
  name: {{ include "backstage.fullname" . }}-app-config
  labels:
    {{- include "backstage.labels" . | nindent 4 }}
data:
  app-config.runtime.yaml: |
    {{- .Values.appConfig | toYaml | nindent 4 }}
  {{- if $rbacAdminUser }}
  app-config.admin.yaml: |
    permission:
      rbac:
        admin:
          users:
            - name: {{ $rbacAdminEntityRef }}
  {{- end }}
