# Overrides for the upstream chart go under the `app:` key (alias declared in Chart.yaml).
# Discover available keys with: helm show values oci://ghcr.io/stefanprodan/charts/podinfo --version 6.12.0
app: {}

host: podinfo.localtest.me
port: 9898
serviceNameSuffix: app

gateway:
  name: edge-gateway
  namespace: gateway

# Note: the workloads ApplicationSet injects top-level `image.repository` and `rbac.adminUser`
# into every Application's values. For umbrella charts they sit as inert dead values at the
# top level (the upstream subchart only sees what's under `app:`). If a future upstream chart
# uses one of these top-level keys natively, expect a collision and override here.
