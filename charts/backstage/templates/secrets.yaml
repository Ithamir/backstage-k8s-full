{{- if .Values.github.auth.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backstage.fullname" . }}-github
  labels:
    {{- include "backstage.labels" . | nindent 4 }}
type: Opaque
data:
  GITHUB_TOKEN: {{ required "github.auth.token is required when github.auth.create=true" .Values.github.auth.token | b64enc }}
{{- end }}
{{- if .Values.oauth.github.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backstage.githubOAuthSecretName" . }}
  labels:
    {{- include "backstage.labels" . | nindent 4 }}
type: Opaque
data:
  AUTH_GITHUB_CLIENT_ID: {{ required "oauth.github.clientId is required when oauth.github.create=true" .Values.oauth.github.clientId | b64enc }}
  AUTH_GITHUB_CLIENT_SECRET: {{ required "oauth.github.clientSecret is required when oauth.github.create=true" .Values.oauth.github.clientSecret | b64enc }}
{{- end }}
