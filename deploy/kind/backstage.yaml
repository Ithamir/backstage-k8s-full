# KinD environment overrides for backstage chart.
# These values are for local development only — do not use for other environments.
image:
  repository: localhost:5001/backstage
  pullPolicy: IfNotPresent

github:
  auth:
    create: false
    existingSecret: backstage-github-token

postgres:
  enabled: true
  auth:
    create: true
    password: hunter2

appConfig:
  kubernetes:
    serviceLocatorMethod:
      type: multiTenant
    clusterLocatorMethods:
      - type: config
        clusters:
          - name: local
            url: https://kubernetes.default.svc.cluster.local
            authProvider: serviceAccount
            skipTLSVerify: false
    customResources:
      - group: gateway.networking.k8s.io
        apiVersion: v1
        plural: gateways
      - group: gateway.networking.k8s.io
        apiVersion: v1
        plural: httproutes
      - group: gateway.networking.k8s.io
        apiVersion: v1
        plural: gatewayclasses
  techdocs:
    builder: local
    generator:
      runIn: local
    publisher:
      type: local
  catalog:
    locations:
      - type: url
        target: https://github.com/Itamar-Ratson/backstage-k8s-full/blob/main/**/catalog-info.yaml
