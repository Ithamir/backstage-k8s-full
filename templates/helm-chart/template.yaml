apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: helm-chart
  title: New Helm Chart
  description: Scaffold a workload Helm chart and catalog entry as a pull request.
  tags:
    - helm
    - kubernetes
    - scaffolder
spec:
  owner: platform
  type: service
  parameters:
    - title: Helm chart details
      required:
        - name
        - description
        - owner
        - system
        - image
        - host
      properties:
        name:
          title: Name
          type: string
          description: Short slug for the chart and workload.
          pattern: ^[a-z][a-z0-9-]{1,38}$
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Human-readable summary for the catalog entity.
        owner:
          title: Owner
          type: string
          description: Owner of the workload.
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - Group
              - User
          default: platform
        system:
          title: System
          type: string
          description: System that owns the workload.
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - System
        image:
          title: Image
          type: string
          description: Container image to run, as repo:tag.
          default: nginx:latest
        host:
          title: Host
          type: string
          description: Public hostname for the HTTPRoute.
          default: ${{ parameters.name }}.localtest.me
        port:
          title: Port
          type: number
          description: Service and container port.
          default: 80
  steps:
    - id: fetchTemplate
      name: Fetch template
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: charts/${{ parameters.name }}
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          image: ${{ parameters.image }}
          host: ${{ parameters.host }}
          port: ${{ parameters.port }}
    - id: publishPullRequest
      name: Publish pull request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Itamar-Ratson&repo=backstage-k8s-full
        branchName: scaffold/helm-chart/${{ parameters.name }}
        targetBranchName: main
        title: Scaffold new chart: ${{ parameters.name }}
        description: |
          Scaffolded workload chart generated from Backstage.

          - Name: `${{ parameters.name }}`
          - Description: `${{ parameters.description }}`
          - Owner: `${{ parameters.owner }}`
          - System: `${{ parameters.system }}`
          - Image: `${{ parameters.image }}`
          - Host: `${{ parameters.host }}`
          - Port: `${{ parameters.port }}`

          Generated by template helm-chart v1
        draft: false
  output:
    links:
      - title: Pull request
        url: ${{ steps.publishPullRequest.output.remoteUrl }}
