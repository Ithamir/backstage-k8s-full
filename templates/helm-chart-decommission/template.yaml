apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: helm-chart-decommission
  title: Decommission Helm Chart
  description: Open a pull request that removes a scaffolded workload Helm chart.
  annotations:
    backstage.io/techdocs-ref: dir:.
  tags:
    - helm
    - kubernetes
    - scaffolder
    - decommission
spec:
  owner: platform
  type: service
  parameters:
    - title: Helm chart decommission details
      required:
        - component
      properties:
        component:
          title: Component
          type: string
          description: Catalog component to decommission.
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - Component
  steps:
    - id: fetchEntity
      name: Fetch catalog entity
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.component }}

    - id: assertManagedByTemplate
      name: Assert template marker
      action: util:assert
      input:
        condition: ${{ steps.fetchEntity.output.entity.metadata.annotations['backstage.io/managed-by-template'] === 'application' }}
        message: >-
          Component `${{ parameters.component }}` is not eligible for helm chart
          decommission. Expected annotation
          `backstage.io/managed-by-template: application`.

    - id: collectBlockingRelations
      name: Collect blocking dependents
      action: util:filterByAttribute
      input:
        items: ${{ steps.fetchEntity.output.entity.relations }}
        attribute: type
        values:
          - dependencyOf
          - hasSubcomponent
          - apiConsumedBy
          - apiProvidedBy
        extract: targetRef

    - id: assertNoBlockingRelations
      name: Assert no blocking dependents
      action: util:assert
      input:
        condition: ${{ steps.collectBlockingRelations.output.count === 0 }}
        message: >-
          Cannot decommission `${{ steps.fetchEntity.output.entity.metadata.name }}`
          because these catalog entities still depend on it:
          ${{ steps.collectBlockingRelations.output.extracted | join(', ') }}

    - id: fetchChartDirectory
      name: Fetch chart directory
      action: fetch:plain
      input:
        url: >-
          https://github.com/Itamar-Ratson/backstage-k8s-full/tree/main/charts/workloads/${{
            steps.fetchEntity.output.entity.metadata.name
          }}/
        targetPath: charts/workloads/${{ steps.fetchEntity.output.entity.metadata.name }}

    - id: listChartFiles
      name: List chart files
      action: fs:readdir
      input:
        paths:
          - charts/workloads/${{ steps.fetchEntity.output.entity.metadata.name }}
        recursive: true

    - id: extractChartFilePaths
      name: Extract chart file paths
      action: util:filterByAttribute
      input:
        items: ${{ steps.listChartFiles.output.files }}
        extract: path

    - id: deleteWorkspaceCopy
      name: Delete workspace copy
      action: fs:delete
      input:
        files:
          - charts/workloads/${{ steps.fetchEntity.output.entity.metadata.name }}

    - id: publishPullRequest
      name: Publish pull request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Itamar-Ratson&repo=backstage-k8s-full
        branchName: decommission/helm-chart/${{ steps.fetchEntity.output.entity.metadata.name }}
        targetBranchName: main
        title: "Decommission chart: ${{ steps.fetchEntity.output.entity.metadata.name }}"
        description: |
          Decommissioned scaffolded workload chart generated from Backstage.

          - Component: `${{ steps.fetchEntity.output.entity.metadata.name }}`
          - Removed path: `charts/workloads/${{ steps.fetchEntity.output.entity.metadata.name }}`
          - Removed values file: `deploy/dev/${{ steps.fetchEntity.output.entity.metadata.name }}.yaml`
          - File count: `${{ steps.listChartFiles.output.files.length }}`
          - Requesting user: `${{ user.ref or 'unknown' }}`

          Merging this PR removes the chart files. ArgoCD will detect the removal and prune the running release within ~3 minutes.
        filesToDelete: ${{
          steps.extractChartFilePaths.output.extracted.concat([
            'deploy/dev/' + steps.fetchEntity.output.entity.metadata.name + '.yaml'
          ])
        }}
        draft: false
  output:
    links:
      - title: Pull request
        url: ${{ steps.publishPullRequest.output.remoteUrl }}
