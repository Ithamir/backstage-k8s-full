apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ci-cd-pipeline
  title: New CI/CD Pipeline
  description: Scaffold a per-app image-build caller workflow and dev deploy values.
  tags:
    - github-actions
    - ci-cd
    - scaffolder
spec:
  owner: platform
  type: service
  parameters:
    - title: CI/CD pipeline details
      description: Requires a working Dockerfile at the supplied path. The deploy values bump file is created by this scaffold, so the first build should not fail because that file is missing.
      required:
        - name
        - owner
      properties:
        name:
          title: Name
          type: string
          description: Short slug for the app and generated workflow.
          pattern: ^[a-z][a-z0-9-]{1,38}$
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Human-readable summary for the generated pipeline.
        owner:
          title: Owner
          type: string
          description: Owner of the app pipeline.
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - Group
              - User
        system:
          title: System
          type: string
          description: System that owns the app.
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - System
        context:
          title: Build context
          type: string
          description: Docker build context. Defaults to the app name.
          default: ${{ parameters.name }}
        dockerfile:
          title: Dockerfile
          type: string
          description: Path to a working Dockerfile. The generated workflow expects this file to exist before the first build.
          default: ${{ parameters.name }}/Dockerfile
        bump-file:
          title: Bump file
          type: string
          description: Deploy values file whose image tag will be bumped. This scaffold creates the file, so first-run failures from a missing bump file should not occur.
          default: deploy/dev/${{ parameters.name }}.yaml
        bump-yaml-path:
          title: Bump YAML path
          type: string
          description: YAML path inside the bump file that stores the image tag.
          default: .image.tag
        path-filter-patterns:
          title: Path filter patterns
          type: string
          description: Explicit allowlist of paths that should trigger an image build.
          ui:widget: textarea
          default: ${{ parameters.name }}/**
  steps:
    - id: fetchTemplate
      name: Fetch template
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: .
        templateFileExtension: '.njk'
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          context: ${{ parameters.context or parameters.name }}
          dockerfile: ${{ parameters.dockerfile or (parameters.name + '/Dockerfile') }}
          bump-file: ${{ parameters['bump-file'] or ('deploy/dev/' + parameters.name + '.yaml') }}
          bump-yaml-path: ${{ parameters['bump-yaml-path'] or '.image.tag' }}
          path-filter-patterns: ${{ parameters['path-filter-patterns'] or (parameters.name + '/**') }}
    - id: publishPullRequest
      name: Publish pull request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Itamar-Ratson&repo=backstage-k8s-full
        branchName: scaffold/ci-cd/${{ parameters.name }}
        targetBranchName: main
        title: "Scaffold CI/CD pipeline: ${{ parameters.name }}"
        description: |
          Scaffolded CI/CD pipeline generated from Backstage.

          - Name: `${{ parameters.name }}`
          - Description: `${{ parameters.description }}`
          - Owner: `${{ parameters.owner }}`
          - System: `${{ parameters.system }}`
          - Context: `${{ parameters.context or parameters.name }}`
          - Dockerfile: `${{ parameters.dockerfile or (parameters.name + '/Dockerfile') }}`
          - Bump file: `${{ parameters['bump-file'] or ('deploy/dev/' + parameters.name + '.yaml') }}`
          - Bump YAML path: `${{ parameters['bump-yaml-path'] or '.image.tag' }}`

          Generated by template ci-cd-pipeline v1
        draft: false
  output:
    links:
      - title: Pull request
        url: ${{ steps.publishPullRequest.output.remoteUrl }}
