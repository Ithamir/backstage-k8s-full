apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: application
  title: New Application
  description: Create a deployable application chart and catalog entry. It can run from chart defaults, and the ci-pipeline template can add an environment override file later.
  annotations:
    backstage.io/techdocs-ref: dir:.
  tags:
    - helm
    - kubernetes
    - scaffolder
spec:
  owner: platform
  type: service
  parameters:
    - title: Application details
      required:
        - name
        - description
        - owner
        - system
        - repository
        - tag
      properties:
        name:
          title: Name
          type: string
          description: Short slug for the application and workload.
          pattern: ^[a-z][a-z0-9-]{1,38}$
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Human-readable summary for the catalog entity.
        owner:
          title: Owner
          type: string
          description: Owner of the workload.
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - Group
              - User
          default: platform
        system:
          title: System
          type: string
          description: System that owns the workload.
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - System
        repository:
          title: Image repository
          type: string
          description: Container image repository to run. Leave blank to default to `ghcr.io/itamar-ratson/backstage-k8s-full/<name>`.
        tag:
          title: Image tag
          type: string
          description: Container image tag to run until a ci-pipeline override bumps it.
          default: latest
        host:
          title: Host
          type: string
          description: Public hostname for the HTTPRoute. Defaults to `<name>.localtest.me`.
        port:
          title: Port
          type: number
          description: Service and container port.
          default: 80
  steps:
    - id: fetchTemplate
      name: Fetch template
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: charts/workloads/${{ parameters.name }}
        templateFileExtension: '.njk'
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          repository: ${{ parameters.repository or ('ghcr.io/itamar-ratson/backstage-k8s-full/' + parameters.name) }}
          tag: ${{ parameters.tag }}
          host: ${{ parameters.host or (parameters.name + '.localtest.me') }}
          port: ${{ parameters.port }}
    - id: publishPullRequest
      name: Publish pull request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Itamar-Ratson&repo=backstage-k8s-full
        branchName: scaffold/application/${{ parameters.name }}
        targetBranchName: main
        title: "Scaffold new application: ${{ parameters.name }}"
        description: |
          Scaffolded application generated from Backstage.

          - Name: `${{ parameters.name }}`
          - Description: `${{ parameters.description }}`
          - Owner: `${{ parameters.owner }}`
          - System: `${{ parameters.system }}`
          - Image repository: `${{ parameters.repository or ('ghcr.io/itamar-ratson/backstage-k8s-full/' + parameters.name) }}`
          - Image tag: `${{ parameters.tag }}`
          - Host: `${{ parameters.host or (parameters.name + '.localtest.me') }}`
          - Port: `${{ parameters.port }}`

          Generated by template application v1
        draft: false
  output:
    links:
      - title: Pull request
        url: ${{ steps.publishPullRequest.output.remoteUrl }}
