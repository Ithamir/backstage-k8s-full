apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: application
  title: New Application
  description: Create a deployable application chart and catalog entry from a container image or third-party Helm chart.
  annotations:
    backstage.io/techdocs-ref: dir:.
  tags:
    - helm
    - kubernetes
    - scaffolder
spec:
  owner: platform
  type: service
  parameters:
    - title: Application details
      required:
        - sourceType
        - name
        - description
        - owner
        - system
      properties:
        sourceType:
          title: Source type
          type: string
          description: Choose whether this workload starts from a container image or a third-party Helm chart.
          enum:
            - image
            - chart
          enumNames:
            - Container image
            - Helm chart
          default: image
          ui:widget: radio
        name:
          title: Name
          type: string
          description: Short slug for the application and workload.
          pattern: ^[a-z][a-z0-9-]{1,38}$
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Human-readable summary for the catalog entity.
        owner:
          title: Owner
          type: string
          description: Owner of the workload.
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - Group
              - User
          default: platform
        system:
          title: System
          type: string
          description: System that owns the workload.
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - System
      dependencies:
        sourceType:
          oneOf:
            - properties:
                sourceType:
                  const: image
                repository:
                  title: Image repository
                  type: string
                  description: Container image repository to run. Leave blank to default to the configured platform GHCR base plus `<name>`.
                tag:
                  title: Image tag
                  type: string
                  description: Container image tag to run until a ci-pipeline override bumps it.
                  default: latest
                host:
                  title: Host
                  type: string
                  description: Public hostname for the HTTPRoute. Defaults to `<name>.localtest.me`.
                port:
                  title: Port
                  type: number
                  description: Service and container port.
                  default: 80
              required:
                - tag
            - properties:
                sourceType:
                  const: chart
                chartRef:
                  title: Chart reference
                  type: string
                  description: OCI chart reference (e.g. ghcr.io/kagent-dev/kagent/helm/kagent:0.9.4). The oci:// prefix is optional.
                  pattern: ^(oci://)?[a-z0-9.-]+(:[0-9]+)?(/[a-zA-Z0-9._-]+)+:[a-zA-Z0-9._-]+$
                serviceNameSuffix:
                  title: Service name suffix
                  type: string
                  description: Suffix appended to the Helm release name to form the upstream Service name.
                port:
                  title: Service port
                  type: number
                  description: Upstream Service port the HTTPRoute should target.
                host:
                  title: Host
                  type: string
                  description: Public hostname for the HTTPRoute. Defaults to `<name>.localtest.me`.
              required:
                - chartRef
                - serviceNameSuffix
                - port
  steps:
    - id: defaults
      name: Resolve platform defaults
      action: platform:resolve-repo-url

    - id: fetchImageTemplate
      name: Fetch image template
      if: ${{ parameters.sourceType === 'image' }}
      action: fetch:template
      input:
        url: ./skeleton/image
        targetPath: charts/workloads/${{ parameters.name }}
        templateFileExtension: '.njk'
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          repository: ${{ parameters.repository or (steps.defaults.output.imageRepositoryBase + '/' + parameters.name) }}
          tag: ${{ parameters.tag }}
          host: ${{ parameters.host or (parameters.name + '.localtest.me') }}
          port: ${{ parameters.port }}

    - id: parseRef
      name: Parse OCI chart reference
      if: ${{ parameters.sourceType === 'chart' }}
      action: platform:parse-oci-ref
      input:
        ref: ${{ parameters.chartRef }}

    - id: fetchChartTemplate
      name: Fetch chart template
      if: ${{ parameters.sourceType === 'chart' }}
      action: fetch:template
      input:
        url: ./skeleton/chart
        targetPath: charts/workloads/${{ parameters.name }}
        templateFileExtension: '.njk'
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          chart: ${{ steps.parseRef.output.chart }}
          repoURL: ${{ steps.parseRef.output.repository }}
          targetRevision: ${{ steps.parseRef.output.version }}
          serviceNameSuffix: ${{ parameters.serviceNameSuffix }}
          port: ${{ parameters.port }}
          host: ${{ parameters.host or (parameters.name + '.localtest.me') }}

    - id: fetchChartDeployDev
      name: Fetch chart deploy values placeholder
      if: ${{ parameters.sourceType === 'chart' }}
      action: fetch:template:file
      input:
        url: ./skeleton/chart-deploy-dev/values.yaml.njk
        targetPath: deploy/dev/${{ parameters.name }}.yaml
        values:
          name: ${{ parameters.name }}
          chart: ${{ steps.parseRef.output.chart }}

    - id: publishImagePullRequest
      name: Publish image pull request
      if: ${{ parameters.sourceType === 'image' }}
      action: publish:github:pull-request
      input:
        repoUrl: ${{ steps.defaults.output.repoUrl }}
        branchName: scaffold/application/${{ parameters.name }}
        targetBranchName: main
        title: "Scaffold new application: ${{ parameters.name }}"
        description: |
          Scaffolded application generated from Backstage.

          - Source type: `image`
          - Name: `${{ parameters.name }}`
          - Description: `${{ parameters.description }}`
          - Owner: `${{ parameters.owner }}`
          - System: `${{ parameters.system }}`
          - Image repository: `${{ parameters.repository or (steps.defaults.output.imageRepositoryBase + '/' + parameters.name) }}`
          - Image tag: `${{ parameters.tag }}`
          - Host: `${{ parameters.host or (parameters.name + '.localtest.me') }}`
          - Port: `${{ parameters.port }}`

          Generated by template application v1
        draft: false

    - id: publishChartPullRequest
      name: Publish chart pull request
      if: ${{ parameters.sourceType === 'chart' }}
      action: publish:github:pull-request
      input:
        repoUrl: ${{ steps.defaults.output.repoUrl }}
        branchName: scaffold/application/${{ parameters.name }}
        targetBranchName: main
        title: "Scaffold new application: ${{ parameters.name }}"
        description: |
          Scaffolded application generated from Backstage.

          - Source type: `chart`
          - Name: `${{ parameters.name }}`
          - Description: `${{ parameters.description }}`
          - Owner: `${{ parameters.owner }}`
          - System: `${{ parameters.system }}`
          - Chart reference: `${{ parameters.chartRef }}`
          - Parsed chart: `${{ steps.parseRef.output.chart }}`
          - Parsed repository: `${{ steps.parseRef.output.repository }}`
          - Parsed version: `${{ steps.parseRef.output.version }}`
          - Service name suffix: `${{ parameters.serviceNameSuffix }}`
          - Service port: `${{ parameters.port }}`
          - Host: `${{ parameters.host or (parameters.name + '.localtest.me') }}`

          Chart source notes:
          - ci-pipeline does not compose with chart-based apps because there is no Dockerfile to build and no image tag to bump.
          - The umbrella wrapper owns the Namespace, HTTPRoute, and labels helper; the upstream chart owns the rendered Deployment and Service.
          - Top-level image.repository and rbac.adminUser injected by workloads-appset are inert dead values for umbrella charts unless the upstream chart's values schema uses those keys natively.
          - Existing chart-case scaffolds generated before this template added `templates/namespace.yaml` will not gain it retroactively. For kagent or any other existing chart-case workload, either add `charts/workloads/<name>/templates/namespace.yaml` with a Namespace named `{{ .Release.Namespace }}` and `gateway-routes: enabled`, or pre-create and label the namespace once with `kubectl create ns <name> && kubectl label ns <name> gateway-routes=enabled`.

          Manual smoke test after merge:
          - Scaffold podinfo from `oci://ghcr.io/stefanprodan/charts/podinfo:<current-6.x-version>` with `serviceNameSuffix=podinfo`, `port=9898`, and no value overrides; merge the PR; confirm Argo CD reports Synced + Healthy and `curl http://podinfo.localtest.me/` returns 200.

          Generated by template application v1
        draft: false
  output:
    links:
      - title: Pull request
        url: ${{ steps.publishImagePullRequest.output.remoteUrl or steps.publishChartPullRequest.output.remoteUrl }}
